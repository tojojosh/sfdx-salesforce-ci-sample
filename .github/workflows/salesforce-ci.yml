name: Salesforce CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli

      - name: Authenticate Dev Hub
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          echo "$SFDX_AUTH_URL" > auth-url.txt
          sf org login sfdx-url --sfdx-url-file auth-url.txt --alias ci-hub --set-default-dev-hub

      - name: Create Scratch Org
        run: |
          sf org create scratch --definition-file config/project-scratch-def.json --alias ci-org --duration-days 1 --set-default

      - name: Push Source
        run: |
          sf project deploy start --source-dir force-app --target-org ci-org --ignore-conflicts

      - name: Run Tests
        run: |
          sf apex run test --target-org ci-org --result-format human --code-coverage

      - name: Delete Scratch Org
        if: always()
        run: |
          sf org delete scratch --target-org ci-org --no-prompt

